<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication Successful - ChromaSync</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
        }
        
        .container {
            text-align: center;
            padding: 3rem;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            max-width: 450px;
            margin: 1rem;
            backdrop-filter: blur(10px);
        }
        
        .success-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 1.5rem;
            background: #4CAF50;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: scaleIn 0.5s ease-out;
        }
        
        .success-icon svg {
            width: 40px;
            height: 40px;
            stroke: white;
            stroke-width: 3;
            animation: checkmark 0.5s ease-out 0.3s both;
        }
        
        h1 {
            color: #333;
            margin-bottom: 1rem;
            font-size: 2rem;
            font-weight: 600;
        }
        
        p {
            color: #666;
            line-height: 1.6;
            margin-bottom: 1rem;
        }
        
        .countdown {
            font-weight: bold;
            color: #667eea;
            font-size: 1.2em;
        }
        
        .progress-bar {
            width: 100%;
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
            margin-top: 2rem;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: #667eea;
            border-radius: 2px;
            animation: progress 5s linear;
            transform-origin: left;
        }
        
        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 2rem;
        }
        
        @keyframes scaleIn {
            from {
                transform: scale(0);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }
        
        @keyframes checkmark {
            from {
                stroke-dashoffset: 50;
                stroke-dasharray: 50;
            }
            to {
                stroke-dashoffset: 0;
                stroke-dasharray: 50;
            }
        }
        
        @keyframes progress {
            from {
                transform: scaleX(1);
            }
            to {
                transform: scaleX(0);
            }
        }
        
        .manual-close {
            font-size: 0.85em;
            color: #999;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">ChromaSync</div>
        
        <div class="success-icon">
            <svg viewBox="0 0 24 24" fill="none">
                <path d="M5 12l5 5L20 7" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>
        
        <h1>Authentication Successful!</h1>
        <p>You've been successfully signed in to ChromaSync.</p>
        <p>This window will close automatically in <span class="countdown">5</span> seconds.</p>
        
        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>
        
        <p class="manual-close">You can close this window and return to ChromaSync.</p>
    </div>

    <script>
        // Auto-close window after 5 seconds
        let countdown = 5;
        const countdownElement = document.querySelector('.countdown');
        
        const timer = setInterval(() => {
            countdown--;
            if (countdownElement) {
                countdownElement.textContent = countdown;
            }
            
            if (countdown <= 0) {
                clearInterval(timer);
                // Try to close the window
                window.close();
                
                // If window.close() doesn't work, update the message
                setTimeout(() => {
                    const container = document.querySelector('.container');
                    if (container) {
                        container.innerHTML = `
                            <div class="logo">ChromaSync</div>
                            <div class="success-icon">
                                <svg viewBox="0 0 24 24" fill="none">
                                    <path d="M5 12l5 5L20 7" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
                                </svg>
                            </div>
                            <h1>All Done!</h1>
                            <p>You can now close this tab and return to the ChromaSync application.</p>
                            <p class="manual-close">Your authentication was successful.</p>
                        `;
                    }
                }, 100);
            }
        }, 1000);

        // Log for debugging
        console.log('ChromaSync authentication redirect page loaded');
        console.log('URL hash:', window.location.hash);
        
        // Try to send tokens to local ChromaSync server
        if (window.location.hash) {
            const hash = window.location.hash.substring(1);
            const params = new URLSearchParams(hash);
            const accessToken = params.get('access_token');
            const refreshToken = params.get('refresh_token');
            
            if (accessToken && refreshToken) {
                console.log('Tokens found, attempting to send to ChromaSync...');
                
                // Try to send to local server
                fetch('http://localhost:54321/auth/complete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        hash: window.location.hash,
                        search: window.location.search 
                    })
                }).then(response => {
                    if (response.ok) {
                        console.log('Successfully sent tokens to ChromaSync');
                        const container = document.querySelector('.container');
                        if (container) {
                            container.innerHTML = `
                                <div class="logo">ChromaSync</div>
                                <div class="success-icon">
                                    <svg viewBox="0 0 24 24" fill="none">
                                        <path d="M5 12l5 5L20 7" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
                                    </svg>
                                </div>
                                <h1>Authentication Complete!</h1>
                                <p>Your tokens have been sent to ChromaSync successfully.</p>
                                <p>You can now close this window and return to the application.</p>
                            `;
                        }
                        // Try to close the window
                        setTimeout(() => window.close(), 2000);
                    } else {
                        throw new Error('Server responded with error');
                    }
                }).catch(error => {
                    console.error('Failed to send tokens to ChromaSync:', error);
                    console.log('ChromaSync app may not be running or local server unavailable');
                    // Continue with normal flow
                });
            }
        }
    </script>
</body>
</html>
